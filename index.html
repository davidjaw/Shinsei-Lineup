<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>信長之野望：新生 線上配將模擬器</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    
    <!-- Import Map for module resolution -->
    <script type="importmap">
      {
        "imports": {
          "vue": "https://esm.sh/vue@3.3.4",
          "vue-router": "https://esm.sh/vue-router@4.5.0?deps=vue@3.3.4",
          "element-plus": "https://esm.sh/element-plus@2.3.14?deps=vue@3.3.4",
          "@element-plus/icons-vue": "https://esm.sh/@element-plus/icons-vue@2.1.0?deps=vue@3.3.4"
        }
      }
    </script>

    <style>
      body {
        font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB',
        'Microsoft YaHei', '微软雅黑', Arial, sans-serif;
        background-color: #f3f4f6;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1; 
      }
      ::-webkit-scrollbar-thumb {
        background: #888; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555; 
      }
      [v-cloak] { display: none; }
      /* Fix mobile viewport: 100vh includes address bar on mobile browsers */
      html, body, #app { height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="app" v-cloak></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
