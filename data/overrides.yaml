  同氣連枝:
    name: 同氣連枝
    type: 指揮
    rarity: S
    target: 自軍群體
    activation_rate: 100%
    description: 戰鬥中，使友軍群體發動普通攻擊後獲得{var:main_stat_buff}點主屬性（{scale:智略}），最多疊加{var:stack_limit}層。
      每回合行動前，有{var:trigger_rate}（{scale:智略}）機率選擇敵軍群體（2-3人）， 選定目標每次造成傷害時，自身有{var:heal_proc_rate}機率根據所造成的傷害量的{var:heal_rate}（{scale:智略}），
      為受到傷害的目標恢復兵力，持續{var:heal_duration}回合。
    brief_description: 友軍增益且復仇治療敵軍
    tags:
    - 增益
    - 治療
    - 減益
    - 指揮效果
    raw_text: 戰鬥中，使友軍群體發動普通攻擊後獲得2.5->5點主屬性（受智略影響），最多疊加5層。每回合行動前，有24%->48%（受智略影響）機率選擇敵軍群體（2-3人），選定目標每次造成傷害時，自身有80%的機率根據所造成的傷害量的14%->28%（受智略影響），為受到傷害的目標恢復兵力，持續1回合。
    vars:
      main_stat_buff:
        base: 2.5
        max: 5
        type: flat
        scale: 智略
      stack_limit: 5
      trigger_rate:
        base: 0.24
        max: 0.48
        scale: 智略
      heal_rate:
        base: 0.14
        max: 0.28
        scale: 智略
      heal_proc_rate: 0.8
      heal_duration: 1
    battle:
      type: 指揮
      trigger: always
      do:
      - trigger: afterAction
        when: action_type == "normal_attack"
        to: allyAll
        do:
        - type: buff
          stat: main_stat
          value: $main_stat_buff
          scale: 智略
          max_stacks: $stack_limit
      - trigger: turnStart
        to: self
        do:
        - type: roll
          chance: $trigger_rate
          scale: 智略
          on_success:
          - to: enemyMultiple
            count_range:
            - 2
            - 3
            do:
            - type: conditional
              condition: on_damage_dealt
              do:
              - type: roll
                chance: $heal_proc_rate
                on_success:
                - to: self
                  do:
                  - type: heal
                    value: damage_dealt
                    rate: $heal_rate
                    scale: 智略
                    duration: $heal_duration
    unique_hero: 阿初
    is_unique: true
    _action: add
