    raw_text: 對統率最低的敵軍單體造成兵刃傷害（傷害率84%->168%），對智略最低的敵軍單體造成謀略傷害（傷害率84%->168%，受智略影響）
    description: 對統率最低的敵軍單體造成{var:dmg_rate}兵刃傷害，對智略最低的敵軍單體造成{var:dmg_rate}謀略傷害（{scale:智略}）。
    brief_description: 雙重傷害針對最低屬性敵軍
    tags:
    - 兵刃傷害
    - 謀略傷害
    - 複數傷害
    - 主動發動
    vars:
      dmg_rate:
        base: 0.84
        max: 1.68
    battle:
      type: 主動
      trigger: beforeAction
      rate: 0.4
      do:
      - to: enemySingle
        select: lowest_stat
        stat: 統率
        do:
        - type: damage
