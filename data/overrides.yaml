        base: 0.1
        max: 0.2
      damage_share:
        base: 0.1
        max: 0.2
      duration: 2
    battle:
      type: 主動
      trigger: beforeAction
      rate: 0.4
      do:
      - to: allyMultiple
        count: 2
        do:
        - type: buff
          stat: damage_reduction
          value: $damage_reduction
          scale: 智略
          duration: $duration
        - type: buff
          stat: damage_share
          value: $damage_share
          scale: 智略
          duration: $duration
    is_event_skill: true
    _action: add
  離心背道:
