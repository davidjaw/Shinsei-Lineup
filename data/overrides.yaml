        - type: debuff
          stat: damage_output
          value: $damage_debuff
          duration: $debuff_duration
    is_event_skill: true
    _action: add
  疑兵盜城:
    name: 疑兵盜城
    type: 主動
    rarity: S
    target: 敵軍群體（2-3人）
    activation_rate: 35%
    description: 使自身智略增加{var:intelligence_buff}點（{scale:智略}），持續{var:buff_duration}回合，
      並使敵軍群體（2-3人）下次受到謀略傷害時，額外受到謀略傷害{var:extra_damage_rate}（{scale:智略}），持續{var:debuff_duration}回合。
    brief_description: 增加智略並增加敵謀略傷害
    tags:
    - 謀略傷害
    - 群體傷害
    - 增益
    - 減益
    - 主動發動
    - 智略系
    raw_text: 疑兵盜城 (S) 種類： 主動 | 謀略群體 發動機率： 35% 效果： 使自身智略增加16.5->33點（受智略影響），持續2回合，並使敵軍群體（2-3人）下次受到謀略傷害時，額外受到謀略傷害（傷害率53%->106%，受智略影響），持續2回合
    vars:
      intelligence_buff:
        base: 16.5
        max: 33
        type: flat
      buff_duration: 2
      extra_damage_rate:
        base: 0.53
        max: 1.06
      debuff_duration: 2
      target_count: 3
    battle:
      type: 主動
      trigger: beforeAction
      rate: 0.35
      do:
      - to: self
        do:
        - type: buff
          stat: 智略
          value: $intelligence_buff
          scale: 智略
          duration: $buff_duration
      - to: enemyMultiple
        countMin: 2
        countMax: 3
        do:
        - type: debuff
          stat: next_mou_damage_taken
          value: $extra_damage_rate
          scale: 智略
          duration: $debuff_duration
    is_event_skill: true
    _action: add
  乘虛而入:
    name: 乘虛而入
    type: 突擊
    rarity: S
    target: 攻擊目標
    activation_rate: 35%
    description: 普通攻擊之後，降低攻擊目標武勇與智略{var:stat_debuff}點，持續{var:debuff_duration}回合。 此外，若目標已處於{status:挑釁}或{status:牽制}狀態，則使自身獲得{var:dodge_rate}{status:閃避}狀態，
      否則使攻擊目標進入{status:挑釁}及{status:牽制}狀態，持續{var:debuff_duration}回合。
    brief_description: 降低屬性或施加控制狀態
    tags:
    - 控制
    - 降低屬性
    - 施加狀態
    - 突擊觸發
    - 武勇系
    - 智略系
    raw_text: 乘虛而入 (S) 種類： 突擊 | 控制 發動機率： 35% 效果： 普通攻擊之後，降低攻擊目標武勇與智略70->140點，持續1回合。此外，若目標已處於挑釁或牽制狀態，則使自身獲得17.5%->35%規避狀態，否則使攻擊目標進入挑釁及牽制狀態，持續1回合。
    vars:
      stat_debuff:
        base: 70
        max: 140
        type: flat
      debuff_duration: 1
      dodge_rate:
        base: 0.175
        max: 0.35
      dodge_duration: 1
    battle:
      type: 突擊
      trigger: afterAttack
      rate: 0.35
      do:
      - to: enemySingle
        do:
        - type: debuff
          stat: 武勇
          value: $stat_debuff
          duration: $debuff_duration
        - type: debuff
          stat: 智略
          value: $stat_debuff
          duration: $debuff_duration
        - type: conditional
          condition: target_has_status(挑釁) || target_has_status(牽制)
          on_true:
          - type: applyStatus
            status: 閃避
            value: $dodge_rate
            duration: $dodge_duration
          on_false:
          - type: applyStatus
            status: 挑釁
            duration: $debuff_duration
          - type: applyStatus
            status: 牽制
            duration: $debuff_duration
    is_event_skill: true
    _action: add
